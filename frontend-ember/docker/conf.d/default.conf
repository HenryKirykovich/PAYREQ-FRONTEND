map $http_accept_language $lang {
    default en;
    ~fr fr;
}

server {
    listen       80;
    server_name  localhost;

    add_header X-Frame-Options "sameorigin"; 
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin";
    add_header Strict-Transport-Security "max-age=31536000; includeSubdomains; preload";
    add_header Permissions-Policy "sync-xhr=(), sync-script=(), encrypted-media=(), document-domain=(), display-capture=(), midi=(), microphone=(), autoplay=(), camera=(), usb=(), geolocation=(), ambient-light-sensor=(), accelerometer=(), vibrate=(), payment=(), magnetometer=(), gyroscope=(), fullscreen=()";
    add_header Content-Security-Policy "default-src 'self' 'unsafe-eval' *.cloudflare.com *.paydock.com cdn.datatables.net cdn.zingchart.com fonts.gstatic.com blob:; img-src * data: blob: https:; style-src 'unsafe-inline' 'self' fonts.googleapis.com; frame-ancestors 'self'" always;
 
    location ~ ^/js/lib/ {
        rewrite  ^/js/lib/(.*) /$1 break;
        root   /usr/share/nginx/html/lib;
    }

    location / {
        root   /usr/share/nginx/html/app;
        index  index.html index.htm;

	default_type "text/html";
  	try_files  $uri $uri.html $uri.$lang $uri.$lang.html =404;
    }
}

