{{#if hasAllAccess}}
<div class="panel panel-default">
    <div class="panel-heading">
        <h4 class="panel-title">{{strings.capitalised.billerSettings.saasuAccountProperties}}</h4>
    </div>
    <div class="panel-body">
        <div class="form-group">
            <label class="col-sm-2 control-label">{{strings.capitalised.billerSettings.fileId}}</label>
            <div class="col-sm-10">
                {{input type="text" classNames="form-control" value=billerSettings.userId}}
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label">{{strings.capitalised.billerSettings.webServiceKey}}</label>
            <div class="col-sm-10">
                {{input type="text" classNames="form-control" value=billerSettings.secret}}
            </div>
        </div>
    </div>
</div>
{{/if}}
