<div id="view-invoice-biller">
	<div class="row">
		<div class="col-md-12">
			<h4>
				Biller {{model.tagName}}
				<small>{{model.id}}</small>
			</h4>
		</div>
	</div>
	<div class="row actions-row" role="toolbar">
		<div class="actions btn-group col-sm-3">
			{{#link-to "biller.invoicesinit" class="btn btn-default"}}<span class="glyphicon glyphicon-arrow-left"></span> Back to mails{{/link-to}}
		</div>
	</div>

	<form class="form-horizontal" role="form">
		<div class="row">
			<div class="col-md-12">
				<div class="panel panel-default">
					<div class="panel-heading">
						<h4 class="panel-title">Mailer Details</h4>
					</div>
					<div class="panel-body">
						<div class="form-group">
							<label class="col-md-2 control-label">Name</label>
							<div class="col-md-10">
								{{input type="text" class="form-control" value=model.tagName}}
							</div>
						</div>
						<div class="form-group">
							<label class="col-md-2 control-label">Email</label>
							<div class="col-md-10">
								{{model.email}}
							</div>
						</div>
						<div class="form-group">
							<div class="col-md-10 pull-right">
								<button class="btn btn-primary" type="button" {{action "updateBiller"}}>Update mailer</button>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</form>
</div>
