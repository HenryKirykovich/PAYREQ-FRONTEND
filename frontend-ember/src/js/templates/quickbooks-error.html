<div class="row">
	<div class="col-md-12">
		<div class="panel panel-default" id="login-panel">
			<div class="panel-heading">
				<h2 class="panel-title">{{strings.qboError.heading}}</h2>
			</div>
			<div class="panel-body">
				<div class="col-md-4 col-md-offset-4">
					<div class="alert alert-danger text-center">
						{{strings.qboError.text}}
					</div>
					<div class="text-center">
						<button class="btn btn-primary" type="submit" {{action 'backTologin' this.username this.password}}>{{strings.qboError.backButton}}</button>
					</div>
				</div>


			</div>
		</div>
	</div>
</div>
