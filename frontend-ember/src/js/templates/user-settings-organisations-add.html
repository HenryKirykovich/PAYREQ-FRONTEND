<div class="row">
	<div class="col-md-12">
		<form class="form-login form" role="form" id="add-org-form">
			<div class="panel panel-default">
				<div class="panel-heading">
					<h4 class="panel-title">{{addAcctStrings.heading}}</h4>
				</div>
				<div class="panel-body">
					<div class="form-group">
						<label for="orgName" class="control-label">{{addAcctStrings.acctNameLabel}}</label>
						{{input classNames="form-control" value=this.orgName id="orgName"}}
						<small id="orgName" class="form-text text-muted">{{addAcctStrings.acctNameHelp}}</small>
					</div>
					<div class="form-group">
						<label for="bus-or-personal" class="control-label">{{addAcctStrings.isBusinessLabel}}</label>
						<form action="" onclick={{action 'markedAsChanged' value="target.value"}}>
						<div class="btn-group radio-group">
							<label class="btn btn-default {{if correct 'active'}}">
								<span class="glyphicon glyphicon-ok"></span>
								<input type="radio"
									   name="correct"
									   selected={{this.markedAs}}
									   value="correct">{{addAcctStrings.yes}}
							</label>
							<label class="btn btn-default {{if incorrect 'active'}}">
								<span class="glyphicon glyphicon-remove"></span>
								<input type="radio"
									   name="incorrect"
									   selected={{this.markedAs}}
									   value="incorrect">{{addAcctStrings.no}}
							</label>
						</div>
						</form>
					</div>
					<button type="button" class="btn btn-primary" {{action 'addOrg' this.orgName this.markedAs}}>
						{{addAcctStrings.add}}
					</button>
				</div>
			</div>
		</form>
	</div>
</div>
